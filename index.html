  <script>
    const manifest = {
      name: "coeur.app", short_name: "coeur.app", start_url: "/",
      display: "standalone", background_color: "#fdf6f0", theme_color: "#fdf6f0",
      icons: [{ src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIiB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiI+CiAgPHJlY3Qgd2lkdGg9IjUxMiIgaGVpZ2h0PSI1MTIiIHJ4PSIxMTUiIGZpbGw9IiNmZGY2ZjAiLz4KICA8dGV4dCB4PSIyNTYiIHk9IjM0MCIgZm9udC1zaXplPSIyODAiIHRleHQtYW5jaG9yPSJtaWRkbGUiPuKdpO+4jzwvdGV4dD4KPC9zdmc+", sizes: "512x512", type: "image/svg+xml" }]
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = URL.createObjectURL(blob);
    document.currentScript.after(link);
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; min-height: 100vh; background: #fdf6f0; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .blob1 { position: fixed; top: -80px; right: -80px; width: 260px; height: 260px; border-radius: 50%; background: radial-gradient(circle, #fce4ec 0%, transparent 70%); pointer-events: none; }
    .blob2 { position: fixed; bottom: -60px; left: -60px; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #fce4ec 0%, transparent 70%); pointer-events: none; }

    #page-home { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 2rem; width: 100%; animation: fadeUp 0.5s ease both; }
    .app-name { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 400; font-style: italic; color: #2d1a1a; letter-spacing: -0.02em; margin-bottom: 8px; }
    .app-name span { color: #e8667a; }
    .app-tagline { font-size: 13px; color: #b07080; margin-bottom: 3.5rem; font-weight: 300; letter-spacing: 0.04em; }
    .home-label { font-size: 13px; color: #b07080; margin-bottom: 16px; font-style: italic; font-family: 'Playfair Display', serif; }
    .home-cards { display: flex; gap: 16px; justify-content: center; }
    .home-card { width: 135px; height: 160px; border-radius: 20px; border: 1.5px solid #f0d8de; background: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s; box-shadow: 0 2px 16px rgba(200,80,100,0.08); }
    .home-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(200,80,100,0.18); border-color: #e8667a; }
    .home-card:active { transform: scale(0.96); }
    .card-avatar { width: 58px; height: 58px; border-radius: 50%; background: #fce4ec; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .card-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 500; color: #2d1a1a; }
    .card-role { font-size: 11px; color: #c0788a; letter-spacing: 0.04em; }

    #page-app { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 2.5rem 1.5rem; width: 100%; animation: fadeUp 0.4s ease both; }
    .back-btn { position: absolute; top: 20px; left: 20px; background: none; border: none; cursor: pointer; font-size: 13px; color: #c0788a; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 5px; padding: 6px 0; transition: color 0.2s; }
    .back-btn:hover { color: #e8667a; }
    .conn-label { font-size: 11px; color: #c0a8b0; display: flex; align-items: center; margin-bottom: 1rem; }
    .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; display: inline-block; margin-right: 5px; transition: background 0.3s; }
    .conn-dot.ok { background: #7ec98a; }
    #inner-app { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; width: 100%; max-width: 360px; }
    .title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; font-style: italic; color: #2d1a1a; text-align: center; line-height: 1.4; max-width: 280px; }

    .desires-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
    .desire-btn { border-radius: 16px; border: 1.5px solid #f0d8de; background: #fff; box-shadow: 0 2px 12px rgba(200,80,100,0.08); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 16px 10px; transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s; position: relative; overflow: hidden; }
    .desire-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(200,80,100,0.2); border-color: #e8667a; }
    .desire-btn:active { transform: scale(0.96); }
    .desire-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .desire-btn .d-icon { font-size: 26px; line-height: 1; }
    .desire-btn .d-label { font-family: 'Playfair Display', serif; font-size: 11px; font-style: italic; color: #c0788a; text-align: center; line-height: 1.35; }
    .desire-btn.sent { border-color: #e8667a; background: #fff5f7; }
    .desire-btn.sent .d-icon { animation: pop 0.35s ease; }
    @keyframes pop { 0% { transform: scale(1); } 40% { transform: scale(1.3); } 70% { transform: scale(0.9); } 100% { transform: scale(1); } }
    .ripple { position: absolute; border-radius: 50%; border: 2px solid #e8667a; width: 60px; height: 60px; animation: rippleOut 0.7s ease-out both; pointer-events: none; }
    @keyframes rippleOut { from { transform: scale(1); opacity: 0.6; } to { transform: scale(4); opacity: 0; } }

    .status-text { font-size: 13px; color: #b07080; text-align: center; font-style: italic; font-family: 'Playfair Display', serif; min-height: 20px; }
    .divider { width: 100%; height: 1px; background: linear-gradient(to right, transparent, #f0d0d8, transparent); }
    .inbox-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #c0788a; font-weight: 500; align-self: flex-start; }
    .messages { width: 100%; display: flex; flex-direction: column; gap: 10px; }
    .msg { background: #fff; border-radius: 16px; padding: 14px 18px; border: 1px solid #f5dde3; display: flex; align-items: center; justify-content: space-between; gap: 12px; animation: fadeUp 0.3s ease both; }
    .msg-left { display: flex; align-items: center; gap: 12px; }
    .msg-dot { width: 34px; height: 34px; border-radius: 50%; background: #fce4ec; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .msg-text { font-size: 13px; color: #2d1a1a; line-height: 1.3; }
    .msg-from { font-size: 11px; color: #c0788a; margin-top: 2px; }
    .msg-time { font-size: 11px; color: #c0788a; white-space: nowrap; }
    .empty-state { text-align: center; padding: 2rem 1rem; color: #c0a8b0; font-size: 13px; font-style: italic; font-family: 'Playfair Display', serif; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="blob1"></div>
  <div class="blob2"></div>

  <div id="page-home">
    <p class="app-name">coeur<span>.</span>app</p>
    <p class="app-tagline">dis-lui ce que tu veux, sans un mot</p>
    <p class="home-label">Je suis...</p>
    <div class="home-cards">
      <div class="home-card" onclick="goToApp('mathilde')">
        <div class="card-avatar">🌸</div>
        <div class="card-name">Mathilde</div>
        <div class="card-role">envoyer</div>
      </div>
      <div class="home-card" onclick="goToApp('raph')">
        <div class="card-avatar">🔥</div>
        <div class="card-name">Raph</div>
        <div class="card-role">recevoir</div>
      </div>
    </div>
  </div>

  <div id="page-app">
    <button class="back-btn" onclick="goHome()">← retour</button>
    <div id="inner-app">
      <div class="conn-label">
        <span class="conn-dot" id="dot"></span>
        <span id="conn-text">Connexion...</span>
      </div>
      <div id="sender-view" style="display:none; flex-direction:column; align-items:center; gap:1.2rem; width:100%;">
        <p class="title">Envie de quelque chose ?<br>Fais le moi savoir ma belle</p>
        <div class="desires-grid" id="desires-grid"></div>
        <p class="status-text" id="status">Appuie pour lui faire savoir</p>
      </div>
      <div id="receiver-view" style="display:none; flex-direction:column; align-items:center; gap:1.5rem; width:100%;">
        <p class="title">Voici ce que Mathilde veut...</p>
        <div class="divider"></div>
        <p class="inbox-label">Messages reçus</p>
        <div class="messages" id="messages"></div>
        <div class="empty-state" id="empty">Rien pour l'instant...<br>Mathilde n'a encore rien envoyé</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://kkdtbtlxkcseyybmarnz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_w6WyUV_2gBZMJFdodXcVug_LoW_oFJr';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const DESIRES = {
      cuni:    { text: 'Je veux un cuni',                                      icon: '🌸' },
      ken:     { text: 'Je veux ken',                                          icon: '🔥' },
      manger:  { text: 'Fais-moi à manger',                                    icon: '🍳' },
      massage: { text: 'Fais-moi un massage',                                  icon: '💆' },
      galoche: { text: 'Galoche',                                               icon: '💋' },
      froid:   { text: 'Il fait trop froid dans mon lit, viens me réchauffer', icon: '🥶' },
      douche:  { text: "J'arrive pas à prendre ma douche, savonne-moi",        icon: '🚿' },
    };

    let me = null, channel = null;

    function buildGrid() {
      document.getElementById('desires-grid').innerHTML = Object.entries(DESIRES).map(([key, d]) =>
        `<button class="desire-btn" id="btn-${key}" onclick="send('${key}')">
          <span class="d-icon">${d.icon}</span>
          <span class="d-label">${d.text}</span>
        </button>`
      ).join('');
    }

    async function init() {
      buildGrid();
      const { error } = await sb.from('messages').select('id').limit(1);
      const dot = document.getElementById('dot');
      const connText = document.getElementById('conn-text');
      if (error) { dot.style.background = '#e8667a'; connText.textContent = 'Erreur de connexion'; }
      else { dot.classList.add('ok'); connText.textContent = 'Connecté'; }
    }

    function goToApp(user) {
      me = user;
      document.getElementById('page-home').style.display = 'none';
      const p = document.getElementById('page-app');
      p.style.display = 'flex'; p.style.animation = 'none'; void p.offsetWidth; p.style.animation = '';
      document.getElementById('sender-view').style.display = user === 'mathilde' ? 'flex' : 'none';
      document.getElementById('receiver-view').style.display = user === 'raph' ? 'flex' : 'none';
      if (user === 'raph') { loadMessages(); subscribeRealtime(); }
      else if (channel) { sb.removeChannel(channel); channel = null; }
    }

    function goHome() {
      me = null;
      if (channel) { sb.removeChannel(channel); channel = null; }
      document.getElementById('page-app').style.display = 'none';
      const h = document.getElementById('page-home');
      h.style.display = 'flex'; h.style.animation = 'none'; void h.offsetWidth; h.style.animation = '';
    }

    function disableAll(v) {
      Object.keys(DESIRES).forEach(k => { const b = document.getElementById('btn-' + k); if (b) b.disabled = v; });
    }

    async function send(type) {
      disableAll(true);
      const { error } = await sb.from('messages').insert({ type });
      disableAll(false);
      if (error) {
        document.getElementById('status').textContent = 'Erreur, réessaie...';
        setTimeout(() => { document.getElementById('status').textContent = 'Appuie pour lui faire savoir'; }, 2000);
        return;
      }
      const btn = document.getElementById('btn-' + type);
      btn.classList.add('sent');
      setTimeout(() => btn.classList.remove('sent'), 600);
      const r = document.createElement('div'); r.className = 'ripple';
      btn.appendChild(r); setTimeout(() => r.remove(), 700);
      document.getElementById('status').textContent = 'Envoyé avec désir ✨';
      setTimeout(() => { document.getElementById('status').textContent = 'Appuie pour lui faire savoir'; }, 2000);
    }

    async function loadMessages() {
      const { data, error } = await sb.from('messages').select('*').order('created_at', { ascending: false }).limit(5);
      if (!error && data) renderMessages(data);
    }

    function subscribeRealtime() {
      if (channel) sb.removeChannel(channel);
      channel = sb.channel('messages-channel')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => { loadMessages(); })
        .subscribe();
    }

    function renderMessages(data) {
      if (me !== 'raph') return;
      const container = document.getElementById('messages');
      const empty = document.getElementById('empty');
      if (!data || data.length === 0) { container.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      container.innerHTML = data.map(m => {
        const d = DESIRES[m.type] || { text: m.type, icon: '💬' };
        const t = new Date(m.created_at);
        const time = t.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        return `<div class="msg">
          <div class="msg-left">
            <div class="msg-dot">${d.icon}</div>
            <div><div class="msg-text">${d.text}</div><div class="msg-from">De Mathilde</div></div>
          </div>
          <div class="msg-time">${time}</div>
        </div>`;
      }).join('');
    }

    init();
  </script>
</body>
</html>
